name: Release macOS

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # better-sqlite3's bundled node-gyp still imports Python's distutils,
      # which was removed from the stdlib in Python 3.12+. macos-latest ships a
      # newer Python, so pin 3.11 (which still has distutils) for the native
      # compile. setuptools is installed as a belt-and-braces distutils shim.
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tooling for native modules
        run: python -m pip install --upgrade pip setuptools

      - name: Install dependencies
        run: npm ci

      # build/icon.png is JPEG-encoded despite its extension, which breaks icns
      # generation. Re-encode it as a real PNG so electron-builder can convert
      # it to a macOS .icns on its own.
      - name: Normalize app icon to PNG
        run: sips -s format png build/icon.png --out build/icon.png

      - name: Build renderer + main
        run: npm run build

      - name: Build and publish macOS app
        run: npx electron-builder --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Unsigned build: stop electron-builder from trying to sign with any
          # certificate that happens to be on the runner.
          CSC_IDENTITY_AUTO_DISCOVERY: false
