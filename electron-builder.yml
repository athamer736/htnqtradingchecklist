appId: com.htnq.tradingchecklist
productName: HTNQ Trading Checklist
publish:
  provider: github
  owner: athamer736
  repo: htnqtradingchecklist
directories:
  buildResources: build
  output: dist
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintrc,.prettierrc,tsconfig.json,tsconfig.*.json}'
  - '!{tailwind.config.js,postcss.config.js}'
asarUnpack:
  - resources/**
  - '**/node_modules/better-sqlite3/**'
win:
  icon: build/icon.png
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  artifactName: ${productName}-${version}-${arch}.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: HTNQ Trading Checklist
portable:
  artifactName: ${productName}-${version}-portable.${ext}
mac:
  icon: build/icon.png
  category: public.app-category.finance
  # Unsigned build: skip code signing / notarization. Mac users bypass
  # Gatekeeper once (right-click > Open). Mac auto-update stays disabled.
  identity: null
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
dmg:
  artifactName: ${productName}-${version}-${arch}.${ext}
